  # Gemini / Generative Language API
  - DOMAIN,generativelanguage.googleapis.com
  - DOMAIN,alkalimakersuite-pa.clients6.google.com
  - DOMAIN,makersuite-pa.clients6.google.com
  - DOMAIN,waa-pa.clients6.google.com
  - DOMAIN,signaler-pa.clients6.google.com
  - DOMAIN,jnn-pa.googleapis.com
  - DOMAIN,optimizationguide-pa.googleapis.com
  - DOMAIN,aisandbox-pa.googleapis.com
  - DOMAIN,proactivebackend-pa.googleapis.com

  # Google 登录 / 账号 / OAuth，Gemini 登录需要
  - DOMAIN,accounts.google.com
  - DOMAIN,myaccount.google.com
  - DOMAIN,accountsettings.google.com
  - DOMAIN,oauth2.googleapis.com
  - DOMAIN,oauthaccountmanager.googleapis.com
  - DOMAIN,apis.google.com
  - DOMAIN,ogs.google.com
  - DOMAIN,people-pa.googleapis.com
  - DOMAIN,people.googleapis.com

  # Gemini 相关 Google API
  - DOMAIN,content-autofill.googleapis.com
  - DOMAIN,firestore.googleapis.com
  - DOMAIN,firebaseremoteconfig.googleapis.com
  - DOMAIN,securetoken.googleapis.com
  - DOMAIN,identitytoolkit.googleapis.com
  - DOMAIN,firebaselogging-pa.googleapis.com

  # Google 基础页面，Gemini 跳转和登录可能用到
  - DOMAIN,www.google.com
  - DOMAIN,google.com

  # Gemini / Google 静态资源，使用精确域名，不用整个 gstatic.com
  - DOMAIN,gemini.gstatic.com
  - DOMAIN,www.gstatic.com
  - DOMAIN,ssl.gstatic.com
  - DOMAIN,fonts.gstatic.com
  - DOMAIN,fonts.googleapis.com

  # Google 用户头像 / 账户图片，使用精确域名，不用整个 googleusercontent.com
  - DOMAIN,lh3.googleusercontent.com
  - DOMAIN,lh4.googleusercontent.com
  - DOMAIN,lh5.googleusercontent.com
  - DOMAIN,lh6.googleusercontent.com

  # Google 图片缓存
  - DOMAIN,encrypted-tbn0.gstatic.com
  - DOMAIN,encrypted-tbn1.gstatic.com
  - DOMAIN,encrypted-tbn2.gstatic.com
  - DOMAIN,encrypted-tbn3.gstatic.com

  # Firebase / App 相关
  - DOMAIN,firebase-settings.crashlytics.com
  - DOMAIN,app-measurement.com
  - DOMAIN-SUFFIX,app-measurement.com
